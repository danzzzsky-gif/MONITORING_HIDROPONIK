<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Hidroponik Solar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Monitoring Sistem Hidroponik Tenaga Surya</h1>
</header>

<div class="container">

<div class="card">
<h2>Tegangan Baterai</h2>
<p id="tegangan">0 V</p>
</div>

<div class="card">
<h2>Arus</h2>
<p id="arus">0 A</p>
</div>

<div class="card">
<h2>Suhu Air</h2>
<p id="suhu">0 °C</p>
</div>

<div class="card">
<h2>TDS Air</h2>
<p id="tds">0 ppm</p>
</div>

<div class="card">
<h2>Status Pompa</h2>
<p id="pompa">OFF</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
